<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Project Proposal System{% endblock %}</title>
    <style>
        :root {
            --bg: #f4efe6;
            --panel: #fffdf8;
            --ink: #1e1b18;
            --muted: #6a625b;
            --accent: #0f766e;
            --accent-dark: #134e4a;
            --line: #ded6ca;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Georgia, "Times New Roman", serif;
            color: var(--ink);
            background:
                radial-gradient(circle at top, rgba(15, 118, 110, 0.12), transparent 28%),
                linear-gradient(180deg, #f8f4ec 0%, var(--bg) 100%);
        }

        .container {
            width: min(1080px, calc(100% - 32px));
            margin: 0 auto;
        }

        .site-header {
            padding: 24px 0;
        }

        .site-header .container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
        }

        .brand {
            font-size: 1.25rem;
            font-weight: 700;
            letter-spacing: 0.04em;
            text-transform: uppercase;
        }

        .nav {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
        }

        .nav a,
        .button {
            color: var(--panel);
            background: var(--accent-dark);
            text-decoration: none;
            padding: 10px 16px;
            border-radius: 999px;
            border: 1px solid transparent;
            transition: transform 0.2s ease, background 0.2s ease;
        }

        .nav a:hover,
        .button:hover {
            background: var(--accent);
            transform: translateY(-1px);
        }

        main {
            padding: 8px 0 48px;
        }

        .hero,
        .panel {
            background: rgba(255, 253, 248, 0.92);
            border: 1px solid var(--line);
            border-radius: 24px;
            box-shadow: 0 16px 40px rgba(30, 27, 24, 0.08);
        }

        .hero {
            padding: 40px;
            margin-bottom: 24px;
        }

        .hero h1 {
            margin: 0 0 12px;
            font-size: clamp(2rem, 5vw, 3.8rem);
            line-height: 0.98;
        }

        .hero p,
        .panel p,
        td,
        th {
            color: var(--muted);
            line-height: 1.6;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .stat-card,
        .panel {
            padding: 24px;
        }

        .stat-card {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 20px;
        }

        .stat-card span {
            display: block;
            font-size: 0.9rem;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 8px;
        }

        .stat-card strong {
            font-size: 2rem;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            text-align: left;
            padding: 14px 12px;
            border-bottom: 1px solid var(--line);
        }

        th {
            color: var(--ink);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        .status {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            background: rgba(15, 118, 110, 0.12);
            color: var(--accent-dark);
            font-size: 0.85rem;
            text-transform: capitalize;
        }

        .empty {
            margin: 0;
            padding: 24px;
            border: 1px dashed var(--line);
            border-radius: 18px;
            background: rgba(244, 239, 230, 0.7);
        }

        @media (max-width: 720px) {
            .site-header .container {
                align-items: flex-start;
                flex-direction: column;
            }

            .hero,
            .panel {
                padding: 24px;
            }

            table,
            thead,
            tbody,
            tr,
            th,
            td {
                display: block;
            }

            thead {
                display: none;
            }

            tr {
                padding: 12px 0;
                border-bottom: 1px solid var(--line);
            }

            td {
                padding: 8px 0;
                border: 0;
            }
        }
    </style>
</head>
<body>
    <header class="site-header">
        <div class="container">
            <div class="brand">Proposal Hub</div>
            <nav class="nav">
                <a href="/">Dashboard</a>
                <a href="/proposals/">Proposals</a>
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
